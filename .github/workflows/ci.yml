name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  POETRY_VERSION: "2.1.3"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install
        run: poetry install --with dev
      - name: ruff
        run: poetry run ruff check src tests
      - name: black
        run: poetry run black --check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install
        run: poetry install --with dev
      - name: mypy
        run: poetry run mypy

  test-py:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bug_triage
          POSTGRES_PASSWORD: bug_triage
          POSTGRES_DB: bug_triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bug_triage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install
        run: poetry install --with dev
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+psycopg://bug_triage:bug_triage@localhost:5432/bug_triage
        run: poetry run alembic upgrade head
      - name: Pytest (unit + integration)
        env:
          HASH_EMBEDDER: "1"
          RUN_INTEGRATION: "1"
          DATABASE_URL: postgresql+psycopg://bug_triage:bug_triage@localhost:5432/bug_triage
        run: poetry run pytest tests/unit tests/integration tests/property --cov=bug_triage --cov-report=term-missing --cov-fail-under=85

  java-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: mvn verify
        working-directory: corpus/target
        run: mvn -B verify

  eval-smoke:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install
        run: poetry install --with dev
      - name: Eval smoke (FakeProvider)
        env:
          HASH_EMBEDDER: "1"
          RUN_EVAL_SMOKE: "1"
        run: poetry run pytest tests/eval -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-py, java-build, eval-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bug-triage:ci
          platforms: linux/amd64
