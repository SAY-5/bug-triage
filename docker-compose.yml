services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bug_triage
      POSTGRES_PASSWORD: bug_triage
      POSTGRES_DB: bug_triage
    ports:
      - "5432:5432"
    volumes:
      - bt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bug_triage"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://bug_triage:bug_triage@postgres:5432/bug_triage
      HASH_EMBEDDER: "1"
      PROVIDER: fake
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  bt_pgdata:
